<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="tableTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdc3c7"/>
      <stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="460" width="800" height="140" fill="#3d3d3d"/>
  <!-- Wall separator -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="#7f8c8d" stroke-width="1" opacity="0.3"/>
  <!-- Inspection table -->
  <rect x="150" y="340" width="500" height="20" rx="3" fill="url(#tableTop)" stroke="#7f8c8d" stroke-width="2"/>
  <!-- Table legs -->
  <rect x="170" y="360" width="10" height="100" fill="#7f8c8d"/>
  <rect x="620" y="360" width="10" height="100" fill="#7f8c8d"/>
  <rect x="395" y="360" width="10" height="100" fill="#7f8c8d"/>
  <!-- Machine on table (scrubber under inspection) -->
  <rect x="290" y="280" width="120" height="60" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
  <rect x="310" y="240" width="80" height="40" rx="4" fill="#34495e" stroke="#3498db" stroke-width="1.5"/>
  <!-- Machine wheels -->
  <circle cx="310" cy="345" r="8" fill="#7f8c8d" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="390" cy="345" r="8" fill="#7f8c8d" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Handle -->
  <line x1="410" y1="290" x2="440" y2="240" stroke="#3498db" stroke-width="4" stroke-linecap="round"/>
  <line x1="425" y1="230" x2="455" y2="230" stroke="#3498db" stroke-width="4" stroke-linecap="round"/>
  <!-- Scrubber pads/brushes -->
  <ellipse cx="330" cy="340" rx="20" ry="6" fill="#e74c3c" opacity="0.7"/>
  <ellipse cx="370" cy="340" rx="20" ry="6" fill="#e74c3c" opacity="0.7"/>
  <!-- Quality check icon - magnifying glass -->
  <circle cx="550" cy="260" r="30" fill="none" stroke="#f1c40f" stroke-width="4"/>
  <line x1="572" y1="282" x2="595" y2="305" stroke="#f1c40f" stroke-width="5" stroke-linecap="round"/>
  <!-- Checkmark overlay on magnifying glass -->
  <polyline points="535,260 545,270 565,245" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Clipboard with checklist -->
  <rect x="630" y="200" width="40" height="55" rx="3" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <line x1="637" y1="212" x2="663" y2="212" stroke="#2c3e50" stroke-width="2"/>
  <line x1="637" y1="220" x2="663" y2="220" stroke="#2c3e50" stroke-width="2"/>
  <line x1="637" y1="228" x2="663" y2="228" stroke="#2c3e50" stroke-width="2"/>
  <line x1="637" y1="236" x2="658" y2="236" stroke="#2c3e50" stroke-width="2"/>
  <rect x="650" y="195" width="10" height="12" rx="2" fill="#2c3e50"/>
  <!-- Small checkmarks on the clipboard -->
  <polyline points="640,218 643,221 647,216" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <polyline points="640,226 643,229 647,224" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <!-- Boxing/packaging area -->
  <rect x="80" y="370" width="80" height="90" rx="3" fill="#d4a574" stroke="#8B6914" stroke-width="2"/>
  <line x1="80" y1="410" x2="160" y2="410" stroke="#8B6914" stroke-width="1"/>
  <line x1="80" y1="440" x2="160" y2="440" stroke="#8B6914" stroke-width="1"/>
  <text x="120" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8B6914" font-weight="bold">SHIP</text>
  <!-- Stacked boxes -->
  <rect x="640" y="370" width="70" height="50" rx="2" fill="#d4a574" stroke="#8B6914" stroke-width="1.5"/>
  <rect x="650" y="355" width="70" height="50" rx="2" fill="#e8c99b" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="640" y1="395" x2="710" y2="395" stroke="#8B6914" stroke-width="1"/>
  <line x1="650" y1="380" x2="720" y2="380" stroke="#8B6914" stroke-width="1"/>
  <!-- QC sticker on boxes -->
  <rect x="655" y="375" width="18" height="18" rx="2" fill="#27ae60" opacity="0.8"/>
  <text x="664" y="387" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">OK</text>
  <!-- Worker figure silhouette -->
  <circle cx="490" cy="200" r="15" fill="#7f8c8d" opacity="0.5"/>
  <rect x="484" y="215" width="12" height="35" rx="4" fill="#7f8c8d" opacity="0.5"/>
  <rect x="475" y="225" width="8" height="25" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <rect x="497" y="225" width="8" height="25" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <!-- Safety goggle hint -->
  <line x1="482" y1="198" x2="498" y2="198" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">Strict Quality Control — Every Machine Tested</text>
</svg>