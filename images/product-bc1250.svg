<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="bodyGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1642"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="460" width="800" height="4" fill="#7f8c8d" opacity="0.3"/>
  <!-- Machine body - heavy duty ride-on (biggest) -->
  <rect x="150" y="240" width="500" height="185" rx="18" fill="url(#bodyGr)" stroke="#f39c12" stroke-width="2.5"/>
  <!-- Roll cage/canopy -->
  <rect x="170" y="170" width="210" height="80" rx="12" fill="#2c3e50" stroke="#f39c12" stroke-width="2"/>
  <!-- Windshield (larger) -->
  <rect x="182" y="180" width="186" height="55" rx="6" fill="#3498db" opacity="0.2"/>
  <!-- Roof light bar -->
  <rect x="220" y="170" width="60" height="8" rx="3" fill="#e74c3c"/>
  <rect x="290" y="170" width="40" height="8" rx="3" fill="#f1c40f"/>
  <!-- Seat area - operator station -->
  <rect x="420" y="220" width="200" height="70" rx="12" fill="#1a252f" stroke="#7f8c8d" stroke-width="1.5"/>
  <!-- Operator seat -->
  <rect x="440" y="235" width="100" height="45" rx="8" fill="#2c3e50"/>
  <rect x="450" y="228" width="80" height="12" rx="5" fill="#e74c3c"/>
  <!-- Arm rests -->
  <rect x="430" y="245" width="10" height="30" rx="4" fill="#7f8c8d"/>
  <rect x="540" y="245" width="10" height="30" rx="4" fill="#7f8c8d"/>
  <!-- Steering controls -->
  <line x1="320" y1="240" x2="320" y2="195" stroke="#7f8c8d" stroke-width="5"/>
  <ellipse cx="320" cy="190" rx="30" ry="12" fill="none" stroke="#2c3e50" stroke-width="5"/>
  <!-- Dashboard (wider) -->
  <rect x="260" y="200" width="100" height="25" rx="5" fill="#34495e"/>
  <circle cx="278" cy="212" r="6" fill="#e74c3c"/>
  <circle cx="296" cy="212" r="6" fill="#f1c40f"/>
  <circle cx="314" cy="212" r="6" fill="#27ae60"/>
  <rect x="330" y="207" width="20" height="12" rx="2" fill="#1abc9c" opacity="0.5"/>
  <!-- Heavy duty headlights -->
  <ellipse cx="180" cy="290" rx="14" ry="8" fill="#f1c40f" opacity="0.9"/>
  <ellipse cx="180" cy="330" rx="14" ry="8" fill="#f1c40f" opacity="0.9"/>
  <ellipse cx="180" cy="370" rx="14" ry="8" fill="#f1c40f" opacity="0.9"/>
  <!-- Heavy duty bumper -->
  <rect x="145" y="380" width="510" height="15" rx="6" fill="#7f8c8d" opacity="0.5"/>
  <!-- Large squeegee (rear) -->
  <line x1="650" y1="370" x2="700" y2="410" stroke="#95a5a6" stroke-width="6" stroke-linecap="round"/>
  <rect x="693" y="398" width="75" height="24" rx="4" fill="#7f8c8d"/>
  <!-- Large solution tank -->
  <rect x="200" y="340" width="160" height="70" rx="8" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="2"/>
  <text x="280" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#3498db">SOLUTION TANK</text>
  <!-- Large recovery tank -->
  <rect x="450" y="340" width="170" height="70" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="535" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e74c3c">RECOVERY TANK</text>
  <!-- Heavy duty wheels -->
  <circle cx="220" cy="430" r="35" fill="#2c3e50" stroke="#7f8c8d" stroke-width="4"/>
  <circle cx="220" cy="430" r="14" fill="#95a5a6"/>
  <circle cx="220" cy="430" r="5" fill="#7f8c8d"/>
  <circle cx="580" cy="430" r="35" fill="#2c3e50" stroke="#7f8c8d" stroke-width="4"/>
  <circle cx="580" cy="430" r="14" fill="#95a5a6"/>
  <circle cx="580" cy="430" r="5" fill="#7f8c8d"/>
  <!-- Dual brush deck (extra wide) -->
  <rect x="195" y="458" width="170" height="18" rx="9" fill="#e74c3c" opacity="0.5"/>
  <ellipse cx="280" cy="467" rx="80" ry="9" fill="#c0392b" opacity="0.4"/>
  <!-- Second brush set (rear) -->
  <rect x="370" y="456" width="60" height="14" rx="7" fill="#e74c3c" opacity="0.35"/>
  <!-- Product label -->
  <text x="400" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="white">BC1250</text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#f39c12" opacity="0.85">HEAVY DUTY RIDE-ON</text>
  <!-- "HD" badge -->
  <rect x="610" y="200" width="50" height="25" rx="4" fill="#f39c12" opacity="0.8"/>
  <text x="635" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a237e">HD</text>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a237e" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">BC1250 — Heavy Duty Ride-On</text>
</svg>