<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>
    <linearGradient id="bodyGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="460" width="800" height="4" fill="#7f8c8d" opacity="0.3"/>
  <!-- Machine body - ride-on scrubber (larger, wider) -->
  <rect x="200" y="250" width="400" height="170" rx="16" fill="url(#bodyGr)" stroke="#3498db" stroke-width="2"/>
  <!-- Cabin/canopy frame -->
  <rect x="220" y="190" width="180" height="70" rx="10" fill="#2c3e50" stroke="#3498db" stroke-width="1.5"/>
  <!-- Windshield -->
  <rect x="230" y="198" width="160" height="50" rx="5" fill="#3498db" opacity="0.25"/>
  <!-- Seat area -->
  <rect x="420" y="230" width="160" height="60" rx="10" fill="#2c3e50" stroke="#7f8c8d" stroke-width="1.5"/>
  <!-- Seat -->
  <rect x="450" y="240" width="100" height="40" rx="8" fill="#34495e"/>
  <rect x="460" y="235" width="80" height="10" rx="4" fill="#e74c3c"/>
  <!-- Steering wheel -->
  <line x1="360" y1="240" x2="360" y2="200" stroke="#7f8c8d" stroke-width="4"/>
  <ellipse cx="360" cy="195" rx="25" ry="10" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <!-- Dashboard -->
  <rect x="300" y="210" width="80" height="20" rx="4" fill="#34495e"/>
  <circle cx="315" cy="220" r="5" fill="#e74c3c"/>
  <circle cx="330" cy="220" r="5" fill="#f1c40f"/>
  <circle cx="345" cy="220" r="5" fill="#27ae60"/>
  <!-- Headlights -->
  <ellipse cx="230" cy="300" rx="10" ry="6" fill="#f1c40f" opacity="0.8"/>
  <ellipse cx="230" cy="340" rx="10" ry="6" fill="#f1c40f" opacity="0.8"/>
  <!-- Squeegee assembly (rear) -->
  <line x1="600" y1="380" x2="650" y2="410" stroke="#95a5a6" stroke-width="5" stroke-linecap="round"/>
  <rect x="645" y="400" width="60" height="20" rx="4" fill="#7f8c8d"/>
  <!-- Solution tank label -->
  <rect x="240" y="350" width="140" height="60" rx="6" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="310" y="383" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3498db">SOLUTION TANK</text>
  <!-- Recovery tank -->
  <rect x="420" y="350" width="150" height="60" rx="6" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="495" y="383" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e74c3c">RECOVERY TANK</text>
  <!-- Wheels (larger for ride-on) -->
  <circle cx="260" cy="425" r="30" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="260" cy="425" r="12" fill="#95a5a6"/>
  <circle cx="540" cy="425" r="30" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="540" cy="425" r="12" fill="#95a5a6"/>
  <!-- Brush deck (wide) -->
  <rect x="240" y="450" width="130" height="16" rx="8" fill="#e74c3c" opacity="0.5"/>
  <ellipse cx="305" cy="458" rx="60" ry="8" fill="#c0392b" opacity="0.4"/>
  <!-- Product label -->
  <text x="400" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white">BC1000</text>
  <text x="400" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#3498db" opacity="0.8">RIDE-ON SCRUBBER</text>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">BC1000 — Ride-On Scrubber</text>
</svg>