<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>
    <linearGradient id="conveyor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>
    <linearGradient id="machineBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="440" width="800" height="160" fill="#3d3d3d"/>
  <!-- Factory ceiling structure -->
  <rect x="0" y="60" width="800" height="12" fill="#7f8c8d" opacity="0.3"/>
  <rect x="0" y="60" width="12" height="380" fill="#7f8c8d" opacity="0.1"/>
  <rect x="788" y="60" width="12" height="380" fill="#7f8c8d" opacity="0.1"/>
  <!-- Hanging lights -->
  <line x1="200" y1="72" x2="200" y2="110" stroke="#f1c40f" stroke-width="1"/>
  <rect x="190" y="110" width="20" height="30" rx="3" fill="#f1c40f" opacity="0.7"/>
  <line x1="400" y1="72" x2="400" y2="110" stroke="#f1c40f" stroke-width="1"/>
  <rect x="390" y="110" width="20" height="30" rx="3" fill="#f1c40f" opacity="0.7"/>
  <line x1="600" y1="72" x2="600" y2="110" stroke="#f1c40f" stroke-width="1"/>
  <rect x="590" y="110" width="20" height="30" rx="3" fill="#f1c40f" opacity="0.7"/>
  <!-- Light glow -->
  <ellipse cx="200" cy="150" rx="60" ry="40" fill="#f1c40f" opacity="0.05"/>
  <ellipse cx="400" cy="150" rx="60" ry="40" fill="#f1c40f" opacity="0.05"/>
  <ellipse cx="600" cy="150" rx="60" ry="40" fill="#f1c40f" opacity="0.05"/>
  <!-- Conveyor belt main body -->
  <rect x="100" y="370" width="600" height="20" rx="5" fill="url(#conveyor)" stroke="#7f8c8d" stroke-width="2"/>
  <!-- Conveyor belt rollers -->
  <circle cx="140" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="220" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="300" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="380" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="460" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="540" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="620" cy="380" r="8" fill="#2c3e50"/>
  <circle cx="700" cy="380" r="8" fill="#2c3e50"/>
  <!-- Conveyor belt side legs -->
  <rect x="140" y="390" width="6" height="50" fill="#7f8c8d"/>
  <rect x="654" y="390" width="6" height="50" fill="#7f8c8d"/>
  <!-- Products on conveyor -->
  <rect x="180" y="330" width="40" height="35" rx="3" fill="#e74c3c"/>
  <rect x="260" y="330" width="40" height="35" rx="3" fill="#3498db"/>
  <rect x="340" y="330" width="40" height="35" rx="3" fill="#2ecc71"/>
  <rect x="420" y="330" width="40" height="35" rx="3" fill="#e67e22"/>
  <rect x="500" y="330" width="40" height="35" rx="3" fill="#9b59b6"/>
  <rect x="580" y="330" width="40" height="35" rx="3" fill="#1abc9c"/>
  <!-- Robotic arm 1 (left) -->
  <rect x="90" y="200" width="30" height="170" rx="5" fill="#34495e"/>
  <circle cx="105" cy="200" r="18" fill="#e74c3c"/>
  <circle cx="105" cy="200" r="8" fill="#c0392b"/>
  <!-- arm joint -->
  <rect x="105" y="250" width="60" height="12" rx="3" fill="#95a5a6" transform="rotate(-30,105,250)"/>
  <circle cx="140" cy="260" r="6" fill="#e74c3c"/>
  <!-- Robotic arm 2 (right) -->
  <rect x="680" y="200" width="30" height="170" rx="5" fill="#34495e"/>
  <circle cx="695" cy="200" r="18" fill="#e74c3c"/>
  <circle cx="695" cy="200" r="8" fill="#c0392b"/>
  <rect x="635" y="250" width="60" height="12" rx="3" fill="#95a5a6" transform="rotate(30,695,250)"/>
  <circle cx="660" cy="260" r="6" fill="#e74c3c"/>
  <!-- CE Certification badge -->
  <circle cx="400" cy="180" r="40" fill="none" stroke="#2ecc71" stroke-width="3" opacity="0.9"/>
  <circle cx="400" cy="180" r="35" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.9"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#2ecc71">CE</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2ecc71">CERTIFIED</text>
  <!-- Tech details decoration -->
  <line x1="50" y1="300" x2="90" y2="300" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="300" x2="50" y2="370" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <line x1="710" y1="300" x2="750" y2="300" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="300" x2="750" y2="370" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">CE Certified Production Line</text>
</svg>