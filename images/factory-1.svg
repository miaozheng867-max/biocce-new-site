<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#34495e"/>
    </linearGradient>
    <linearGradient id="walling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#bdc3c7"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="420" width="800" height="180" fill="#2d5016"/>
  <!-- Factory building -->
  <rect x="100" y="180" width="600" height="240" fill="url(#walling)" stroke="#7f8c8d" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="80,180 400,80 720,180" fill="url(#roof)"/>
  <!-- Smokestacks -->
  <rect x="180" y="80" width="20" height="100" fill="#7f8c8d"/>
  <rect x="260" y="60" width="20" height="120" fill="#7f8c8d"/>
  <rect x="340" y="90" width="20" height="90" fill="#7f8c8d"/>
  <!-- Smoke puffs -->
  <circle cx="190" cy="70" r="12" fill="#95a5a6" opacity="0.5"/>
  <circle cx="205" cy="55" r="15" fill="#95a5a6" opacity="0.3"/>
  <circle cx="220" cy="42" r="10" fill="#95a5a6" opacity="0.2"/>
  <circle cx="270" cy="50" r="14" fill="#95a5a6" opacity="0.5"/>
  <circle cx="285" cy="35" r="18" fill="#95a5a6" opacity="0.3"/>
  <circle cx="350" cy="80" r="10" fill="#95a5a6" opacity="0.4"/>
  <!-- Windows -->
  <rect x="140" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="210" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="280" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="350" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="420" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="490" y="220" width="50" height="60" rx="3" fill="#3498db" opacity="0.7"/>
  <!-- Door -->
  <rect x="340" y="330" width="80" height="90" rx="3" fill="#2c3e50"/>
  <circle cx="405" cy="380" r="4" fill="#f1c40f"/>
  <!-- Factory floor extension -->
  <rect x="100" y="360" width="600" height="60" fill="#95a5a6" opacity="0.3"/>
  <!-- Company name on building -->
  <text x="400" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">BIOCCE</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#7f8c8d">10,000㎡ Manufacturing Base</text>
  <!-- Fence -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#7f8c8d" stroke-width="3"/>
  <line x1="100" y1="380" x2="100" y2="420" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="700" y1="380" x2="700" y2="420" stroke="#7f8c8d" stroke-width="2"/>
  <!-- Trees -->
  <circle cx="70" cy="400" r="25" fill="#27ae60"/>
  <rect x="67" y="400" width="6" height="20" fill="#8B4513"/>
  <circle cx="730" cy="400" r="25" fill="#27ae60"/>
  <rect x="727" y="400" width="6" height="20" fill="#8B4513"/>
  <circle cx="750" cy="410" r="18" fill="#2ecc71"/>
  <rect x="748" y="410" width="4" height="15" fill="#8B4513"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="35" fill="#f39c12" opacity="0.8"/>
  <circle cx="680" cy="80" r="25" fill="#f1c40f"/>
  <!-- Watermark text -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">BIOCCE Factory — 10,000㎡ Manufacturing Base</text>
</svg>