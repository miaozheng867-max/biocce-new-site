<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>
    <linearGradient id="bodyGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="460" width="800" height="4" fill="#7f8c8d" opacity="0.3"/>
  <!-- Machine body - compact scrubber dryer -->
  <rect x="250" y="270" width="300" height="140" rx="14" fill="url(#bodyGr)" stroke="#2ecc71" stroke-width="2"/>
  <!-- Upper console -->
  <rect x="270" y="230" width="260" height="55" rx="8" fill="#34495e" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- Console details -->
  <rect x="360" y="242" width="60" height="30" rx="4" fill="#1abc9c" opacity="0.5"/>
  <circle cx="310" cy="257" r="8" fill="#e74c3c"/>
  <circle cx="335" cy="257" r="8" fill="#f1c40f"/>
  <rect x="440" y="247" width="40" height="20" rx="3" fill="#2c3e50" stroke="#95a5a6" stroke-width="1"/>
  <text x="460" y="261" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#95a5a6">AUTO</text>
  <!-- Handle -->
  <line x1="400" y1="230" x2="400" y2="125" stroke="#7f8c8d" stroke-width="7" stroke-linecap="round"/>
  <rect x="360" y="115" width="80" height="14" rx="7" fill="#2c3e50"/>
  <rect x="358" y="113" width="12" height="18" rx="4" fill="#e74c3c"/>
  <rect x="430" y="113" width="12" height="18" rx="4" fill="#e74c3c"/>
  <!-- Squeegee assembly -->
  <line x1="550" y1="380" x2="600" y2="400" stroke="#95a5a6" stroke-width="4" stroke-linecap="round"/>
  <rect x="595" y="392" width="50" height="16" rx="3" fill="#7f8c8d"/>
  <!-- Solution tank -->
  <rect x="265" y="335" width="130" height="70" rx="6" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="330" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2ecc71">SOLUTION</text>
  <!-- Recovery tank -->
  <rect x="405" y="335" width="130" height="70" rx="6" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="470" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e74c3c">RECOVERY</text>
  <!-- Wheels -->
  <circle cx="300" cy="415" r="25" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="300" cy="415" r="10" fill="#95a5a6"/>
  <circle cx="500" cy="415" r="25" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="500" cy="415" r="10" fill="#95a5a6"/>
  <!-- Brush deck -->
  <rect x="270" y="438" width="100" height="14" rx="7" fill="#e74c3c" opacity="0.6"/>
  <ellipse cx="320" cy="445" rx="45" ry="8" fill="#c0392b" opacity="0.5"/>
  <!-- Product label -->
  <text x="400" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="white">BC600</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" opacity="0.7">COMPACT SCRUBBER DRYER</text>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">BC600 — Compact Scrubber Dryer</text>
</svg>