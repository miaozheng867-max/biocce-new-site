<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>
    <linearGradient id="bodyGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor line -->
  <rect y="460" width="800" height="4" fill="#7f8c8d" opacity="0.3"/>
  <!-- Machine body - walk-behind scrubber -->
  <rect x="280" y="280" width="240" height="130" rx="12" fill="url(#bodyGr)" stroke="#3498db" stroke-width="2"/>
  <!-- Upper control panel area -->
  <rect x="300" y="240" width="200" height="50" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="1.5"/>
  <!-- Control panel details -->
  <circle cx="350" cy="265" r="8" fill="#e74c3c"/>
  <circle cx="380" cy="265" r="8" fill="#27ae60"/>
  <rect x="410" y="258" width="30" height="15" rx="3" fill="#34495e" stroke="#95a5a6" stroke-width="1"/>
  <!-- Display screen -->
  <rect x="450" y="255" width="30" height="20" rx="2" fill="#1abc9c" opacity="0.6"/>
  <!-- Handle - walk behind -->
  <line x1="400" y1="240" x2="400" y2="150" stroke="#7f8c8d" stroke-width="6" stroke-linecap="round"/>
  <rect x="370" y="140" width="60" height="12" rx="6" fill="#2c3e50"/>
  <!-- Handle grips -->
  <rect x="368" y="138" width="10" height="16" rx="4" fill="#e74c3c"/>
  <rect x="422" y="138" width="10" height="16" rx="4" fill="#e74c3c"/>
  <!-- Squeegee arm (back) -->
  <line x1="520" y1="380" x2="560" y2="400" stroke="#95a5a6" stroke-width="4" stroke-linecap="round"/>
  <rect x="555" y="395" width="40" height="12" rx="3" fill="#7f8c8d"/>
  <!-- Water tank (transparent blue) -->
  <rect x="300" y="340" width="100" height="65" rx="5" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="1.5"/>
  <text x="350" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3498db">TANK</text>
  <!-- Waste tank -->
  <rect x="410" y="340" width="100" height="65" rx="5" fill="#e74c3c" opacity="0.2" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="460" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e74c3c">WASTE</text>
  <!-- Wheels -->
  <circle cx="320" cy="415" r="22" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="320" cy="415" r="8" fill="#95a5a6"/>
  <circle cx="480" cy="415" r="22" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="480" cy="415" r="8" fill="#95a5a6"/>
  <!-- Brush head underneath -->
  <ellipse cx="340" cy="440" rx="50" ry="12" fill="#e74c3c" opacity="0.7"/>
  <line x1="310" y1="440" x2="370" y2="440" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="435" x2="320" y2="445" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="433" x2="340" y2="447" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="435" x2="360" y2="445" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
  <!-- Product label -->
  <text x="400" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">BC500</text>
  <!-- Watermark -->
  <rect x="0" y="555" width="800" height="45" fill="#1a3a5c" opacity="0.85"/>
  <text x="400" y="582" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.8">BC500 — Walk-Behind Scrubber</text>
</svg>