<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products — BIOCCE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="product-images.js"></script>
<script src="scene-images.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;color:#1A1A1A;background:#FAFAF8;line-height:1.5}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid #E8E8E8}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;padding:0 32px;height:72px}
.nav-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:36px;height:36px;background:#1A3A4A;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700}
.logo-text{font-size:1.15rem;font-weight:700;color:#1A1A1A;letter-spacing:.5px}
.nav-right{display:flex;align-items:center;gap:32px;list-style:none}
.nav-right a{font-size:.85rem;font-weight:500;color:#666;letter-spacing:.3px}
.nav-right a:hover,.nav-right a.active{color:#1A3A4A}
.nav-cta{display:inline-block;padding:10px 24px;background:#1A3A4A;color:#fff!important;border-radius:6px;font-size:.8rem!important;font-weight:600!important}
.nav-cta:hover{background:#2D5A6E!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:22px;height:2px;background:#1A1A1A;border-radius:2px;transition:.3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

.hero{padding-top:72px;background:#fff}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;padding:80px 32px;max-width:1280px;margin:0 auto}
.hero-text .label{font-size:.75rem;font-weight:600;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.hero-text h1{font-size:clamp(2rem,3.5vw,3rem);font-weight:700;color:#1A1A1A;margin-bottom:16px;line-height:1.15}
.hero-text p{font-size:.95rem;color:#666;line-height:1.6;max-width:480px}
.hero-image-wrap{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.hero-image-wrap img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover}
.hero-image-wrap .overlay-tag{position:absolute;bottom:16px;left:16px;background:rgba(26,58,74,.88);color:#fff;padding:8px 16px;border-radius:6px;font-size:.75rem;font-weight:600;backdrop-filter:blur(4px)}

.content{max-width:1280px;margin:0 auto;padding:48px 32px 80px;display:grid;grid-template-columns:260px 1fr;gap:40px}

.sidebar{position:sticky;top:120px;align-self:start}
.sidebar h3{font-size:.8rem;font-weight:600;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
.sidebar h4{font-size:.85rem;font-weight:600;color:#1A1A1A;margin-bottom:12px}
.sidebar .fg{margin-bottom:32px}
.sidebar label{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;font-size:.85rem;color:#444}
.sidebar label:hover{color:#1A3A4A}
.sidebar input[type="checkbox"]{appearance:none;width:18px;height:18px;border:2px solid #CCC;border-radius:3px;cursor:pointer;flex-shrink:0;position:relative}
.sidebar input[type="checkbox"]:checked{border-color:#1A3A4A;background:#1A3A4A}
.sidebar input[type="checkbox"]:checked::after{content:'';position:absolute;top:2px;left:5px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.sidebar .count{color:#BBB;font-size:.75rem;margin-left:auto}
.sidebar .btn-clear{background:none;border:none;color:#999;font-size:.8rem;cursor:pointer;padding:4px 0}
.sidebar .btn-clear:hover{color:#1A3A4A}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.header .count{font-size:.85rem;color:#999}
.filter-toggle{display:none;align-items:center;gap:8px;padding:10px 20px;background:#fff;border:1px solid #E0E0E0;border-radius:6px;font-size:.85rem;font-weight:500;cursor:pointer;color:#444}
.filter-toggle:hover{border-color:#1A3A4A}
.filter-mask{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:99}
.filter-mask.open{display:block}
.sidebar .close-f{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#666;margin-bottom:20px;padding:0}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #ECECEC;cursor:pointer;display:flex;flex-direction:column}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.1)}
.card .img-wrap{aspect-ratio:4/3;background:#F5F5F3;position:relative;display:flex;align-items:center;justify-content:center}
.card .img-wrap img{max-width:85%;max-height:85%;object-fit:contain;display:block}
.card .img-wrap .placeholder{color:#CCC;font-size:.75rem}
.card .info{padding:16px 20px 20px;display:flex;flex-direction:column;flex:1;min-height:135px}
.card .tag{font-size:.65rem;font-weight:600;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;height:14px;line-height:14px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card h3{font-size:.95rem;font-weight:600;color:#1A1A1A;margin-bottom:2px;line-height:1.2;height:22px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card .model{font-size:.8rem;color:#C9A84C;font-weight:600;margin-bottom:6px;height:18px;line-height:18px}
.card .spec{font-size:.78rem;color:#999;margin-bottom:auto;display:flex;gap:6px;flex-wrap:wrap;height:20px;overflow:hidden}
.card .spec span{background:#F0F2F4;padding:2px 8px;border-radius:4px;height:20px;line-height:16px;white-space:nowrap}
.card .learn{font-size:.78rem;font-weight:600;color:#1A3A4A;display:inline-flex;align-items:center;gap:4px;margin-top:14px;height:18px}
.card:hover .learn{gap:8px}
.card .badge{position:absolute;top:12px;left:12px;background:rgba(26,58,74,.85);color:#fff;font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:4px;backdrop-filter:blur(4px);z-index:2}

.pages{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:32px;padding-top:24px;border-top:1px solid #ECECEC}
.pg-btn{padding:8px 14px;border:1px solid #D0D0D0;border-radius:6px;background:#fff;color:#666;font-size:.8rem;font-weight:500;cursor:pointer;font-family:Inter,sans-serif}
.pg-btn:hover{background:#F5F5F3;border-color:#1A3A4A;color:#1A3A4A}
.pg-btn.on{background:#1A3A4A;border-color:#1A3A4A;color:#fff}
.pg-btn:disabled{opacity:.4;cursor:default}

.caps{max-width:1280px;margin:0 auto;padding:0 32px 80px}
.caps h2{font-size:1.1rem;font-weight:600;color:#1A3A4A;margin-bottom:28px;padding-bottom:10px;border-bottom:2px solid #1A3A4A;display:inline-block}
.cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.cap-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #ECECEC}
.cap-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.06)}
.cap-card .img-area{aspect-ratio:16/10;overflow:hidden}
.cap-card .img-area img{width:100%;height:100%;object-fit:cover}
.cap-card .body{padding:20px 24px 24px}
.cap-card .body .icon{width:36px;height:36px;background:linear-gradient(135deg,#1A3A4A,#2D5A6E);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#C9A84C;font-size:.8rem;font-weight:700;margin-bottom:12px}
.cap-card .body h3{font-size:.95rem;font-weight:600;color:#1A1A1A;margin-bottom:6px}
.cap-card .body p{font-size:.82rem;color:#666;line-height:1.6}

@media(max-width:1024px){
  .hero-inner{grid-template-columns:1fr;gap:32px;padding-top:56px;padding-bottom:56px}
  .hero-text p{max-width:100%}
  .content{grid-template-columns:1fr;padding-top:32px}
  .sidebar{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:#fff;z-index:100;padding:32px;overflow-y:auto}
  .sidebar.open{display:block}
  .grid{grid-template-columns:repeat(2,1fr)}
  .filter-toggle{display:inline-flex!important}
  .cap-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .nav-right{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:#fff;flex-direction:column;justify-content:center;gap:24px;padding:40px;box-shadow:-4px 0 20px rgba(0,0,0,.08);transition:right .3s;z-index:999}
  .nav-right.open{right:0}
  .hamburger{display:flex;z-index:1001}
  .grid{grid-template-columns:1fr}
  .cap-grid{grid-template-columns:1fr}
  .hero-inner{padding:40px 20px}
  .content{padding:32px 20px 60px}
  .caps{padding:0 20px 48px}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-left">
      <div class="logo-mark">BC</div>
      <span class="logo-text">BIOCCE</span>
    </div>
    <ul class="nav-right" id="navR">
      <li><a href="/">Home</a></li>
      <li><a href="#" class="active">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Insights</a></li>
      <li><a href="#" class="nav-cta">Contact</a></li>
    </ul>
    <button class="hamburger" id="ham">&nbsp;</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <p class="label">PRODUCT RANGE</p>
      <h1>All products</h1>
      <p>Professional floor scrubbers, sweepers, and accessories engineered for industrial performance.</p>
    </div>
    <div class="hero-image-wrap" id="heroImg"></div>
  </div>
</section>

<section class="content">
  <aside class="sidebar" id="sidebar">
    <button class="close-f" id="closeF">&times;</button>
    <h3>Filters</h3>
    <div class="fg">
      <h4>Category</h4>
      <label><input type="checkbox" value="scrubber" checked><span>Floor Scrubber</span><span class="count" id="c0">0</span></label>
      <label><input type="checkbox" value="vacuum" checked><span>Industrial Vacuum</span><span class="count" id="c1">0</span></label>
      <label><input type="checkbox" value="pw" checked><span>Pressure Washer</span><span class="count" id="c2">0</span></label>
      <label><input type="checkbox" value="wipes" checked><span>Industrial Wipes</span><span class="count" id="c3">0</span></label>
    </div>
    <button class="btn-clear" onclick="clearF()">Clear all filters</button>
  </aside>
  <div class="filter-mask" id="mask"></div>

  <div>
    <div class="header">
      <span class="count" id="total">0 products</span>
      <button class="filter-toggle" id="filterBtn">&#9776; Filters</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pages" id="pages"></div>
  </div>
</section>

<section class="caps">
  <h2>Our Capabilities</h2>
  <div class="cap-grid" id="caps"></div>
</section>

<script>
var PS = 6, pg = 1;
var prods = [
  {i:"BC1250",n:"Ride-On Floor Scrubber BC1250",c:"scrubber",t:"RIDE-ON SCRUBBER",s:["1100mm","255L Tank","6600m2/h"],k:"bc1250",b:"FLAGSHIP"},
  {i:"BC1000",n:"Ride-On Floor Scrubber BC1000",c:"scrubber",t:"RIDE-ON SCRUBBER",s:["1000mm","175L Tank","6000m2/h"],k:"bc1000",b:"LITHIUM"},
  {i:"BC600",n:"Compact Ride-On Scrubber BC600",c:"scrubber",t:"COMPACT RIDE-ON",s:["560mm","80L Tank","3360m2/h"],k:"bc600",b:"COMPACT"},
  {i:"BC500",n:"Walk-Behind Floor Scrubber BC500",c:"scrubber",t:"WALK-BEHIND",s:["500mm","55L Tank","2350m2/h"],k:"bc500",b:"WALK-BEHIND"},
  {i:"BC-V1",n:"Industrial Vacuum 100L",c:"vacuum",t:"VACUUM CLEANER",s:["100L","2000W"],k:"",b:""},
  {i:"BC-V2",n:"Industrial Vacuum 50L",c:"vacuum",t:"VACUUM CLEANER",s:["50L","1500W"],k:"",b:""},
  {i:"BC-P1",n:"Electric Pressure Washer",c:"pw",t:"PRESSURE WASHER",s:["200bar","2000W"],k:"",b:""},
  {i:"BC-P2",n:"Petrol Pressure Washer",c:"pw",t:"PRESSURE WASHER",s:["300bar","7HP"],k:"",b:""},
  {i:"BC-W1",n:"Industrial Wiper Rolls",c:"wipes",t:"INDUSTRIAL WIPES",s:["35x40cm","500 Sheets"],k:"",b:""},
  {i:"BC-W2",n:"Heavy-Duty Wipers",c:"wipes",t:"INDUSTRIAL WIPES",s:["40x50cm","250 Sheets"],k:"",b:""}
];

function render(arr) {
  var tp = Math.max(1,Math.ceil(arr.length/PS));
  if (pg>tp) pg=tp;
  var st=(pg-1)*PS, items=arr.slice(st,st+PS);
  var h="";
  for (var i=0;i<items.length;i++) {
    var p=items[i];
    var imgSrc = (typeof PRODUCT_IMAGES!=='undefined' && PRODUCT_IMAGES[p.k]) ? PRODUCT_IMAGES[p.k] : "";
    var nn = p.n.replace(/\sBC\d+$/,"");
    var badge = p.b ? '<span class="badge">'+p.b+'</span>' : "";
    var img = imgSrc ? '<img src="'+imgSrc+'" alt="'+p.n+'" loading="lazy">' : '<div class="placeholder">Image</div>';
    var sp = "";
    for (var j=0;j<p.s.length;j++) sp += '<span>'+p.s[j]+'</span>';
    h += '<div class="card" onclick="location.href=\'product-'+p.i+'.html\'">';
    h += '<div class="img-wrap">'+badge+img+'</div>';
    h += '<div class="info">';
    h += '<div class="tag">'+p.t+'</div>';
    h += '<h3>'+nn+'</h3>';
    h += '<div class="model">'+p.i+'</div>';
    h += '<div class="spec">'+sp+'</div>';
    h += '<span class="learn">View Details &rarr;</span>';
    h += '</div></div>';
  }
  document.getElementById("grid").innerHTML = h;
  document.getElementById("total").innerHTML = arr.length+" product"+(arr.length!==1?"s":"");
  // pagination
  var ph = "";
  ph += '<button class="pg-btn" onclick="go('+(pg-1)+')"'+(pg<=1?' disabled':'')+'>&lsaquo; Prev</button>';
  for (var i=1;i<=tp;i++) ph += '<button class="pg-btn'+(i===pg?' on':'')+'" onclick="go('+i+')">'+i+'</button>';
  ph += '<button class="pg-btn" onclick="go('+(pg+1)+')"'+(pg>=tp?' disabled':'')+'>Next &rsaquo;</button>';
  document.getElementById("pages").innerHTML = ph;
}

function go(p) {
  var arr = getFiltered();
  if (p<1 || p>Math.ceil(arr.length/PS)) return;
  pg=p; render(arr);
}

function getFiltered() {
  var checked=[];
  var cbs = document.querySelectorAll(".sidebar input[type='checkbox']");
  for (var i=0;i<cbs.length;i++) { if(cbs[i].checked && cbs[i].value) checked.push(cbs[i].value); }
  if (checked.length===0) return [];
  return prods.filter(function(p){ return checked.indexOf(p.c)!==-1; });
}

function filterFn() { pg=1; render(getFiltered()); }
function clearF() {
  var cbs = document.querySelectorAll(".sidebar input[type='checkbox']");
  for (var i=0;i<cbs.length;i++) cbs[i].checked=true;
  filterFn();
}

// Attach checkbox events
var cbs = document.querySelectorAll(".sidebar input[type='checkbox']");
for (var i=0;i<cbs.length;i++) cbs[i].onchange=filterFn;

// Counts
function cnt() {
  var m={}; for (var i=0;i<prods.length;i++) { var c=prods[i].c; m[c]=(m[c]||0)+1; }
  document.getElementById("c0").innerHTML=m.scrubber||0;
  document.getElementById("c1").innerHTML=m.vacuum||0;
  document.getElementById("c2").innerHTML=m.pw||0;
  document.getElementById("c3").innerHTML=m.wipes||0;
}

// Scenes
function loadScenes() {
  if (typeof SCENE_IMAGES==='undefined') return;
  document.getElementById("heroImg").innerHTML = '<img src="'+SCENE_IMAGES.gate+'" alt="Factory"><div class="overlay-tag">BIOCCE &middot; Factory</div>';
  var data = [
    {img:SCENE_IMAGES.scene1,icon:"01",t:"Precision Manufacturing",d:"State-of-the-art production line in Shanghai, China."},
    {img:SCENE_IMAGES.scene2,icon:"02",t:"ISO Certified Workshop",d:"ISO 9001 certified workshop ensuring consistent quality."},
    {img:SCENE_IMAGES.scene3,icon:"03",t:"Global Distribution",d:"Exporting to 50+ countries with reliable logistics."}
  ];
  var h="";
  for (var i=0;i<data.length;i++) {
    h += '<div class="cap-card"><div class="img-area"><img src="'+data[i].img+'" alt="'+data[i].t+'"></div>';
    h += '<div class="body"><div class="icon">'+data[i].icon+'</div><h3>'+data[i].t+'</h3><p>'+data[i].d+'</p></div></div>';
  }
  document.getElementById("caps").innerHTML = h;
}

// Mobile events
document.getElementById("ham").onclick=function(){
  document.getElementById("navR").classList.toggle("open");
  this.classList.toggle("active");
};
var nls = document.querySelectorAll(".nav-right a");
for (var i=0;i<nls.length;i++) nls[i].onclick=function(){
  document.getElementById("navR").classList.remove("open");
  document.getElementById("ham").classList.remove("active");
};
document.getElementById("filterBtn").onclick=function(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("mask").classList.add("open");
};
document.getElementById("closeF").onclick=function(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("mask").classList.remove("open");
};
document.getElementById("mask").onclick=function(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("mask").classList.remove("open");
};

cnt(); render(getFiltered()); loadScenes();
</script>
</body>
</html>
